# Target Python version
target-version = "py312"

# Line length matching Black's default
line-length = 88

[lint]
# Enable Pyflakes, pycodestyle, isort, and pyupgrade rules
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "C90",  # mccabe
]

# Allow unused imports in __init__.py files
ignore-init-module-imports = true

# Ignore specific rule sets or rules if necessary
ignore = [
    "E501", # Line too long (managed by formatter)
]

[lint.mccabe]
max-complexity = 10

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
